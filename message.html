{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent</title>
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }
    .message-box {
      background: white;
      padding: 40px 60px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    .message-box h2 {
      color: #2563eb;
      margin-bottom: 20px;
    }
    .message-box p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }
    .message-box a {
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 25px;
      border-radius: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <h2>✅ Message Sent Successfully!</h2>
    <p>Thank you for your feedback. We will get back to you soon.</p>
    <a href="{% url 'feedback' %}">Go Back</a>
  </div>
</body>
</html>
