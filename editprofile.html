<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1508780709619-79562169bc64?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay for darkening background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.45);
            z-index: 0;
        }

        .edit-container {
            position: relative;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.95); /* semi-transparent */
            backdrop-filter: blur(8px);
            padding: 30px 35px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3a8a;
            font-size: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #374151;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border: 3px solid #3b82f6;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(90deg, #1e40af, #2563eb);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #3b82f6;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .edit-container {
                width: 90%;
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

<div class="edit-container">
    <h2>Edit Profile</h2>

    {% if user.image %}
        <img src="{{ user.image.url }}" class="profile-img">
    {% else %}
        <img src="https://via.placeholder.com/100" class="profile-img">
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" value="{{ user.name }}" required>

        <label>Email</label>
        <input type="email" value="{{ user.email }}" readonly>

        <label>Gender</label>
        <select name="gender">
            <option value="">Select</option>
            <option value="F" {% if user.gender == "F" %}selected{% endif %}>Female</option>
            <option value="M" {% if user.gender == "M" %}selected{% endif %}>Male</option>
            <option value="O" {% if user.gender == "O" %}selected{% endif %}>Others</option>
        </select>

        <label>Profile Image</label>
        <input type="file" name="image">

        <!-- <label>Caption Language</label>
        <select name="caption_language">
            <option value="en" {% if user.caption_language == "en" %}selected{% endif %}>English</option>
            <option value="ml" {% if user.caption_language == "ml" %}selected{% endif %}>Malayalam</option>
            <option value="hi" {% if user.caption_language == "hi" %}selected{% endif %}>Hindi</option>
            <option value="fr" {% if user.caption_language == "fr" %}selected{% endif %}>French</option>
            <option value="es" {% if user.caption_language == "es" %}selected{% endif %}>Spanish</option>
        </select> -->

        <button type="submit">Update Profile</button>
    </form>

    <a href="{% url 'profile' %}" class="back-link">← Back to Profile</a>
</div>

</body>
</html>
